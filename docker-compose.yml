services:
  mysql:
    image: mysql:8.0
    container_name: velocesport-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: velocesport
      MYSQL_PASSWORD: changeme
      MYSQL_DATABASE: velocesport_dev
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uvelocesport', '-pchangeme']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
