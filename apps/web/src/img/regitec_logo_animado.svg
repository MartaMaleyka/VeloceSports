<svg xmlns="http://www.w3.org/2000/svg" width="680" height="240" viewBox="0 80 680 160" role="img">
<title>REGITEC logo animado</title>
<desc>Logo deportivo dorado animado.</desc>
<defs>
<linearGradient id="mkA" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#E8A317"/>
<stop offset="1" stop-color="#B45309"/>
</linearGradient>
<linearGradient id="goldA" x1="0" y1="1" x2="1" y2="0">
<stop offset="0" stop-color="#E8A317"/>
<stop offset="1" stop-color="#FFB830"/>
</linearGradient>
<linearGradient id="greenA" x1="0" y1="1" x2="1" y2="0">
<stop offset="0" stop-color="#16A078"/>
<stop offset="1" stop-color="#5EEAD4"/>
</linearGradient>
<clipPath id="ballClip">
<circle r="7"/>
</clipPath>
</defs>
<g transform="translate(148,150) scale(1.22)">
<rect x="-80" y="-80" width="160" height="160" rx="40" fill="url(#mkA)">
<animate attributeName="opacity" from="0" to="1" dur="0.5s" fill="freeze"/>
</rect>
<path d="M -52,46 Q -16,40 8,24 Q 34,6 52,-20" fill="none" stroke="#FDE68A" stroke-width="5" stroke-linecap="round" opacity="0.65" stroke-dasharray="160" stroke-dashoffset="160">
<animate attributeName="stroke-dashoffset" from="160" to="0" dur="0.8s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1" values="160;0"/>
</path>
<path d="M -52,34 L -38,34 L -28,34 L -16,-2 L -4,30 L 6,14 L 16,14 Q 30,12 40,-8 Q 50,-28 56,-44" fill="none" stroke="url(#greenA)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="240" stroke-dashoffset="240">
<animate attributeName="stroke-dashoffset" from="240" to="0" dur="1.1s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1" values="240;0"/>
</path>
<path d="M 38,-44 L 56,-44 L 56,-26" fill="none" stroke="#1EBE92" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" opacity="0">
<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/>
</path>
<g transform="translate(-52, 34)" opacity="0">
<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
<g>
<animateTransform attributeName="transform" type="scale" values="1;1.43;1" dur="1.6s" begin="1.8s" repeatCount="indefinite"/>
<g transform="scale(1.14)">
<circle r="7" fill="#FFFFFF" stroke="#0F172A" stroke-width="0.55"/>
<g clip-path="url(#ballClip)">
<path fill="#0F172A" d="M 0,-2.55 L 2.42,-0.78 L 1.5,2.05 L -1.5,2.05 L -2.42,-0.78 Z"/>
<path fill="#0F172A" d="M 0,-7.1 L 1.35,-5.35 L -1.35,-5.35 Z"/>
<path fill="#0F172A" d="M -4.35,1.05 L -2.55,2.75 L -4.05,4.55 L -6.15,3.35 Z"/>
<path fill="#0F172A" d="M 4.35,1.05 L 6.15,3.35 L 4.05,4.55 L 2.55,2.75 Z"/>
<path fill="#0F172A" d="M -1.15,5.55 L 1.15,5.55 L 0,7.35 Z"/>
</g>
</g>
</g>
</g>
</g>
<g transform="translate(252,134)" opacity="0">
<animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.4s" fill="freeze"/>
<text x="0" y="0" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="64" font-weight="bold" font-style="italic" letter-spacing="-1.5" fill="#FFFFFF">REGI<tspan fill="#FFB830">TEC</tspan></text>
</g>
<g transform="translate(254,156)" opacity="0">
<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.7s" fill="freeze"/>
<rect x="0" y="0" width="46" height="5" rx="2.5" fill="#FFB830"/>
<rect x="52" y="0" width="188" height="5" rx="2.5" fill="#FDE68A" opacity="0.55"/>
</g>
<text x="254" y="196" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="500" letter-spacing="0.3" fill="#FFFFFF" opacity="0">Desde aquí nace el futuro<animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.9s" fill="freeze"/></text>
</svg>
